<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Market Details - {{ area }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-VC0FDXgR5ww3ZrJmuwXOnkPgu4Ch6wNWHqgbv81M9rL13g92UbwSRX1uIbOJ7a5i" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Price Curves for {{ area }}</h1>
    <div class="mb-3">
        <a href="{{ url_for('index') }}">&larr; Back to summary</a>
    </div>
    <!-- Embed the Plotly chart HTML -->
    <div id="chart-container">
        {{ chart_html|safe }}
    </div>
</div>
</body>
</html>
