name: Electricity Market Analysis

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  analysis:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas matplotlib

      - name: Run analysis
        run: python analysis/build_analysis.py

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p charts reports
          git add charts reports
          git diff --cached --quiet || git commit -m "Update analysis outputs"
          git push
